<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#f9fafb;padding:20px}
.login{max-width:360px;margin:50px auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.login h2{margin-bottom:16px}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
button{padding:10px 14px;background:#10b981;color:#fff;border:none;border-radius:8px;width:100%;cursor:pointer}
.panel{display:none;max-width:700px;margin:0 auto}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
.row{display:flex;gap:8px;margin:4px 0}
.row input{flex:1;padding:8px}
.btn2{padding:8px;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn3{padding:8px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-add{margin:16px 0;background:#16a34a}
</style>
</head>
<body>

<div class="login" id="loginPanel">
  <h2>Admin Login</h2>
  <input id="auser" placeholder="Admin User"><br>
  <input id="apwd" type="password" placeholder="Admin Password"><br>
  <button type="button" onclick="adminLogin()">Login</button>
</div>

<div class="panel" id="panel">
  <h2>Account Manager</h2>
  <button class="btn-add" type="button" onclick="addUser()">+ Add Account</button>
  <div id="list"></div>
</div>

<script>
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin888';
let userList = [];

function adminLogin() {
  const u = document.getElementById('auser').value.trim();
  const p = document.getElementById('apwd').value.trim();
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    loadUsers();
  } else {
    alert('Wrong username or password');
  }
}

async function loadUsers() {
  const res = await fetch('/api/admin/users');
  userList = await res.json();
  render();
}

function render() {
  const d = document.getElementById('list');
  d.innerHTML = '';
  userList.forEach(u => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="row"><input value="${u.username}" id="u${u.id}"></div>
      <div class="row"><input value="${u.password}" id="p${u.id}" placeholder="Password"></div>
      <div class="row"><input value="${u.expire}" id="e${u.id}" placeholder="2027-12-31"></div>
      <div class="row">
        <button type="button" class="btn3" onclick="update(${u.id})">Save</button>
        <button type="button" class="btn${u.banned ? 3 : 2}" onclick="toggle(${u.id})">${u.banned ? 'Enable' : 'Ban'}</button>
        <button type="button" class="btn2" onclick="del(${u.id})">Del</button>
      </div>
    `;
    d.appendChild(div);
  });
}

async function update(id) {
  const u = document.getElementById('u'+id).value.trim();
  const p = document.getElementById('p'+id).value.trim();
  const e = document.getElementById('e'+id).value.trim();

  if (!u || !p || !e) {
    alert('Please fill in all fields');
    return;
  }

  await fetch('/api/admin/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, username: u, password: p, expire: e })
  });

  alert('Saved successfully!');
  loadUsers();
}

async function toggle(id) {
  await fetch('/api/admin/toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  loadUsers();
}

async function del(id) {
  await fetch('/api/admin/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  loadUsers();
}

async function addUser() {
  await fetch('/api/admin/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: 'user',
      password: '123456',
      expire: '2027-12-31'
    })
  });
  loadUsers();
}
</script>
</body>
</html>
